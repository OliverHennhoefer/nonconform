name: Post-publish verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to verify (e.g. 0.98.7)"
        required: true

jobs:
  verify:
    name: Verify PyPI install (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI availability
        # PyPI indexing can lag a few seconds after a release is published.
        run: sleep 30

      - name: Install from PyPI
        # Release trigger: version comes from the tag (strips leading "v").
        # Manual trigger: version comes from the workflow_dispatch input.
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          VERSION="${VERSION#v}"
          pip install "nonconform[pyod,data,probabilistic]==${VERSION}"

      - name: Verify public API imports
        run: |
          python - <<'EOF'
          import nonconform
          from nonconform import (
              ConformalDetector,
              Split,
              CrossValidation,
              JackknifeBootstrap,
              Empirical,
              Probabilistic,
              logistic_weight_estimator,
              forest_weight_estimator,
          )
          print(f"nonconform {nonconform.__version__} — all public imports OK")
          EOF

      - name: Verify fit/predict cycle
        run: |
          python - <<'EOF'
          import numpy as np
          from sklearn.ensemble import IsolationForest
          from nonconform import ConformalDetector, Split, Empirical

          rng = np.random.default_rng(0)
          X_train = rng.standard_normal((200, 4))
          X_test  = rng.standard_normal((40, 4))

          cd = ConformalDetector(
              detector=IsolationForest(n_estimators=20, random_state=0),
              strategy=Split(n_calib=50),
              estimation=Empirical(),
              seed=0,
          )
          cd.fit(X_train)
          p_values = cd.compute_p_values(X_test)

          assert p_values.shape == (40,)
          assert np.all(np.isfinite(p_values))
          assert np.all((0.0 <= p_values) & (p_values <= 1.0))
          print(f"fit/predict OK — p-value range [{p_values.min():.3f}, {p_values.max():.3f}]")
          EOF

      - name: Verify pyod extra
        run: |
          python - <<'EOF'
          from pyod.models.iforest import IForest
          import numpy as np
          from nonconform import ConformalDetector, Split, Empirical

          rng = np.random.default_rng(1)
          X_train = rng.standard_normal((200, 4))
          X_test  = rng.standard_normal((30, 4))

          cd = ConformalDetector(
              detector=IForest(n_estimators=20, random_state=1),
              strategy=Split(n_calib=50),
              estimation=Empirical(),
              seed=1,
          )
          cd.fit(X_train)
          p_values = cd.compute_p_values(X_test)
          assert np.all((0.0 <= p_values) & (p_values <= 1.0))
          print("pyod extra OK")
          EOF

      - name: Verify installed version matches release tag
        run: |
          python - <<'EOF'
          import importlib.metadata, os
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          installed = importlib.metadata.version("nonconform")
          assert installed == tag, f"version mismatch: installed={installed}, expected={tag}"
          print(f"Version match OK: {installed}")
          EOF
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
